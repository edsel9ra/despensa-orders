services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/public:/var/www/public:ro
    depends_on:
      php:
        condition: service_started
    restart: always
    networks:
      - app-network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-despensa}
      DB_USERNAME: ${DB_USERNAME:-despensa}
      DB_PASSWORD: ${DB_PASSWORD:-despensa}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-warning}
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-despensa}
      MYSQL_USER: ${DB_USERNAME:-despensa}
      MYSQL_PASSWORD: ${DB_PASSWORD:-despensa}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
